spring:
  main:
    lazy-initialization: true                     # Important

  application:
    name: Ecommerce

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: true


  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: default
      password: ${REDIS_PASSWORD}
      timeout: 10s
      lettuce:
          pool:
            max-active: 8
            max-idle: 8
            min-idle: 2

  cache:
    type: redis

server:
  port: ${PORT:8080}